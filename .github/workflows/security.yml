# Geplanter Security-Scan (Claude-frei) — wöchentlich + manuell auslösbar.
# Ergänzt build.yml (Secret-Scan bei jedem Push) um einen TIEFEN History-Scan und
# meldet Funde als Issue aufs Board. Dependency-CVEs deckt Dependabot kontinuierlich ab.
# Von new-project nach .github/workflows/security.yml kopiert.
name: security-scan
on:
  schedule:
    - cron: "17 6 * * 1"   # wöchentlich, Mo 06:17 UTC
  workflow_dispatch:        # jederzeit manuell startbar
permissions:
  contents: read
  issues: write
jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0   # ganze History für den Secret-Scan
      - name: Secret-Scan (gitleaks, inkl. History)
        run: docker run --rm -v "$PWD:/repo" ghcr.io/gitleaks/gitleaks:latest detect --source=/repo --redact -v
      - name: Issue bei Fund
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create --repo "$GITHUB_REPOSITORY" \
            --title "🔒 Security-Scan rot ($(date +%F))" \
            --body "Der geplante Security-Scan hat angeschlagen (gitleaks). Run-Log: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID — bitte als Security-Item via /flow beheben." \
            || true
# Erweiterbar (train/teamLeader): CodeQL (SAST, sprachspezifisch) + OSV-Scanner als zusätzliche Jobs.
